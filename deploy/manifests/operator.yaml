# Source: varax-monitor/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: varax-monitor
  labels:
    helm.sh/chart: varax-monitor-0.1.0
    app.kubernetes.io/name: varax-monitor
    app.kubernetes.io/instance: varax-monitor
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: varax-monitor
      app.kubernetes.io/instance: varax-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: varax-monitor
        app.kubernetes.io/instance: varax-monitor
    spec:
      serviceAccountName: varax-monitor
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: varax-monitor
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          image: "ghcr.io/varaxlabs/varax-monitor:1.0.0"
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
# Source: varax-monitor/templates/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: varax-monitor
  labels:
    helm.sh/chart: varax-monitor-0.1.0
    app.kubernetes.io/name: varax-monitor
    app.kubernetes.io/instance: varax-monitor
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: varax-monitor
      app.kubernetes.io/instance: varax-monitor
