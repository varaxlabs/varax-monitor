# Default values for varax-monitor

# Number of replicas (1 is usually sufficient)
replicaCount: 1

image:
  repository: ghcr.io/varaxlabs/varax-monitor
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a service account
  create: true
  # Annotations to add to the service account
  annotations: {}
  # Name of the service account (auto-generated if not set)
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Resource limits and requests
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Metrics configuration
metrics:
  # Port for the metrics endpoint
  port: 8080
  # Path for the metrics endpoint
  path: /metrics

  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    # Enable ServiceMonitor creation
    enabled: true
    # Scrape interval
    interval: 15s
    # Additional labels for the ServiceMonitor
    labels: {}
    # Namespace for the ServiceMonitor (defaults to release namespace)
    namespace: ""

# Health probe configuration
healthProbe:
  port: 8081

