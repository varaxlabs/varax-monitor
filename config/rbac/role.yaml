apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: varax-monitor
  labels:
    app: varax-monitor
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
