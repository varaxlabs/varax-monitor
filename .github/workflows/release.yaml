name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker build -t ghcr.io/varaxlabs/varax-monitor:${VERSION} .
          docker tag ghcr.io/varaxlabs/varax-monitor:${VERSION} ghcr.io/varaxlabs/varax-monitor:latest
          docker push ghcr.io/varaxlabs/varax-monitor:${VERSION}
          docker push ghcr.io/varaxlabs/varax-monitor:latest

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o varax-monitor-linux-amd64 cmd/operator/main.go
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o varax-monitor-linux-arm64 cmd/operator/main.go
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o varax-monitor-darwin-amd64 cmd/operator/main.go
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o varax-monitor-darwin-arm64 cmd/operator/main.go

      - name: Package Helm chart
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          helm package deploy/helm/varax-monitor --version ${VERSION} --app-version ${VERSION}

      - name: Push Helm chart to GHCR
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          helm push varax-monitor-${VERSION}.tgz oci://ghcr.io/varaxlabs/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            varax-monitor-*
            varax-monitor-*.tgz
