name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # Required for keyless Cosign signing via Sigstore/Fulcio

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          echo "semver=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          helm package deploy/helm/onax \
            --version ${{ steps.version.outputs.semver }} \
            --app-version ${{ steps.version.outputs.semver }}

      - name: Push Helm chart to GHCR
        run: |
          helm push onax-${{ steps.version.outputs.semver }}.tgz \
            oci://ghcr.io/varaxlabs/charts

      - name: Sign Helm chart
        run: |
          cosign sign --yes \
            ghcr.io/varaxlabs/charts/onax:${{ steps.version.outputs.semver }}

      - name: Upload Helm chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            onax-${{ steps.version.outputs.semver }}.tgz
