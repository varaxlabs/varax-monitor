name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --save-dev @commitlint/{cli,config-conventional}
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: Run tests
        run: |
          KUBEBUILDER_ASSETS="$(setup-envtest use 1.30.0 --bin-dir ./testbin -p path)" \
            go test ./pkg/... -coverprofile cover.out -race -v
      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func cover.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build binary
        run: CGO_ENABLED=0 go build -o bin/onax ./cmd/operator
      - name: Build Docker image
        run: docker build -t ghcr.io/varaxlabs/onax:ci .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: e2e-test
      - name: Build and load image
        run: |
          docker build -t ghcr.io/varaxlabs/onax:e2e .
          kind load docker-image ghcr.io/varaxlabs/onax:e2e --name e2e-test
      - name: Deploy operator
        run: |
          helm install onax ./deploy/helm/onax \
            --namespace monitoring \
            --create-namespace \
            --set image.tag=e2e \
            --set metrics.serviceMonitor.enabled=false \
            --wait --timeout 120s
      - name: Verify operator is running
        run: |
          kubectl get pods -n monitoring -l app.kubernetes.io/name=onax
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=onax -n monitoring --timeout=60s
      - name: Deploy test CronJob
        run: kubectl apply -f examples/basic-cronjob.yaml
      - name: Check metrics endpoint
        run: |
          kubectl port-forward -n monitoring svc/onax 8080:8080 &
          sleep 5
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/metrics | grep -q cronjob_monitor; then
              echo "Found cronjob_monitor metrics"
              exit 0
            fi
            echo "Attempt $i: metrics not yet available, retrying in 5s..."
            sleep 5
          done
          echo "Metrics output:"
          curl -sf http://localhost:8080/metrics || true
          echo "Operator logs:"
          kubectl logs -n monitoring -l app.kubernetes.io/name=onax --tail=50 || true
          echo "FAIL: cronjob_monitor metrics not found after 60s"
          exit 1
