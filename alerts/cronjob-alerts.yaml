apiVersion: v1
kind: ConfigMap
metadata:
  name: cronjob-monitor-alerts
  namespace: monitoring
  labels:
    app: onax
data:
  alerts.yaml: |
    groups:
    - name: cronjob_monitoring
      interval: 1m
      rules:
      - alert: CronJobFailed
        expr: cronjob_monitor_execution_status == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "CronJob {{ $labels.cronjob }} failed"
          description: "CronJob {{ $labels.cronjob }} in namespace {{ $labels.namespace }} has failed its last execution."
          runbook_url: "https://github.com/varaxlabs/onax/blob/main/docs/troubleshooting.md#cronjob-failed"

      - alert: CronJobMissedSchedule
        expr: increase(cronjob_monitor_missed_schedules_total[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "CronJob {{ $labels.cronjob }} missed schedule"
          description: "CronJob {{ $labels.cronjob }} in namespace {{ $labels.namespace }} missed its scheduled execution."
          runbook_url: "https://github.com/varaxlabs/onax/blob/main/docs/troubleshooting.md#missed-schedule"

      - alert: CronJobSlowExecution
        expr: cronjob_monitor_execution_duration_seconds > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CronJob {{ $labels.cronjob }} is running slow"
          description: "CronJob {{ $labels.cronjob }} in namespace {{ $labels.namespace }} took {{ $value | humanizeDuration }} (>1 hour)."
          runbook_url: "https://github.com/varaxlabs/onax/blob/main/docs/troubleshooting.md#slow-execution"

      - alert: CronJobLowSuccessRate
        expr: cronjob_monitor_success_rate < 0.9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "CronJob {{ $labels.cronjob }} has low success rate"
          description: "CronJob {{ $labels.cronjob }} in namespace {{ $labels.namespace }} has success rate of {{ $value | humanizePercentage }}."
          runbook_url: "https://github.com/varaxlabs/onax/blob/main/docs/troubleshooting.md#low-success-rate"

      - alert: CronJobNoRecentSuccess
        expr: (time() - cronjob_monitor_last_success_timestamp) > 172800
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CronJob {{ $labels.cronjob }} has no recent success"
          description: "CronJob {{ $labels.cronjob }} in namespace {{ $labels.namespace }} has not succeeded in over 48 hours."
          runbook_url: "https://github.com/varaxlabs/onax/blob/main/docs/troubleshooting.md#no-recent-success"
