# Example CronJobs for testing k8s-cronjob-monitor
---
# A CronJob that succeeds every 5 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob-success
  namespace: default
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: test
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - echo "Success!"; sleep 10
          restartPolicy: OnFailure
---
# A CronJob that fails every 10 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob-failure
  namespace: default
spec:
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: test
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - echo "About to fail..."; exit 1
          restartPolicy: Never
---
# A CronJob that takes a long time (2 minutes)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob-slow
  namespace: default
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: test
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - echo "Slow job starting..."; sleep 120; echo "Done!"
          restartPolicy: OnFailure
---
# A CronJob in a different namespace
apiVersion: v1
kind: Namespace
metadata:
  name: test-namespace
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob-namespace
  namespace: test-namespace
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: test
            image: busybox:1.36
            command:
            - /bin/sh
            - -c
            - echo "Running in test-namespace"; sleep 5
          restartPolicy: OnFailure
