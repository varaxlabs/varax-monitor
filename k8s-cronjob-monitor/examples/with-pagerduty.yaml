# AlertManager configuration for PagerDuty notifications
# Add this to your AlertManager config to receive CronJob alerts in PagerDuty
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-pagerduty
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    route:
      group_by: ['alertname', 'cronjob', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'pagerduty-warning'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          repeat_interval: 1h

    receivers:
      - name: 'pagerduty-warning'
        pagerduty_configs:
          - routing_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
            severity: 'warning'
            description: '{{ .CommonAnnotations.summary }}'
            details:
              cronjob: '{{ .CommonLabels.cronjob }}'
              namespace: '{{ .CommonLabels.namespace }}'
              description: '{{ .CommonAnnotations.description }}'

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
            severity: 'critical'
            description: '{{ .CommonAnnotations.summary }}'
            details:
              cronjob: '{{ .CommonLabels.cronjob }}'
              namespace: '{{ .CommonLabels.namespace }}'
              description: '{{ .CommonAnnotations.description }}'
