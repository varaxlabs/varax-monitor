name: Docker Build

on:
  push:
    branches: [main]

permissions:
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kubeshield/k8s-cronjob-monitor:latest
            ghcr.io/kubeshield/k8s-cronjob-monitor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
