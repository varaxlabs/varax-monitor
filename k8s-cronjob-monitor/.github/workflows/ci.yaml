name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: Run tests
        run: |
          KUBEBUILDER_ASSETS="$(setup-envtest use 1.30.0 --bin-dir ./testbin -p path)" \
            go test ./pkg/... -coverprofile cover.out -race -v
      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func cover.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binary
        run: CGO_ENABLED=0 go build -o bin/operator cmd/operator/main.go
      - name: Build Docker image
        run: docker build -t ghcr.io/kubeshield/k8s-cronjob-monitor:ci .

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: e2e-test
      - name: Build and load image
        run: |
          docker build -t ghcr.io/kubeshield/k8s-cronjob-monitor:e2e .
          kind load docker-image ghcr.io/kubeshield/k8s-cronjob-monitor:e2e --name e2e-test
      - name: Deploy operator
        run: |
          helm install k8s-cronjob-monitor ./deploy/helm/k8s-cronjob-monitor \
            --namespace monitoring \
            --create-namespace \
            --set image.tag=e2e \
            --wait --timeout 120s
      - name: Verify operator is running
        run: |
          kubectl get pods -n monitoring -l app.kubernetes.io/name=k8s-cronjob-monitor
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=k8s-cronjob-monitor -n monitoring --timeout=60s
      - name: Deploy test CronJob
        run: kubectl apply -f examples/basic-cronjob.yaml
      - name: Check metrics endpoint
        run: |
          kubectl port-forward -n monitoring svc/k8s-cronjob-monitor 8080:8080 &
          sleep 5
          curl -sf http://localhost:8080/metrics | grep cronjob_monitor
