apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-cronjob-monitor.fullname" . }}
  labels:
    {{- include "k8s-cronjob-monitor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "k8s-cronjob-monitor.selectorLabels" . | nindent 4 }}
