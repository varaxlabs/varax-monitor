apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-cronjob-monitor.fullname" . }}
  labels:
    {{- include "k8s-cronjob-monitor.labels" . | nindent 4 }}
rules:
  # Read CronJobs
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]

  # Read Jobs (to track executions)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

  # Read Pods (to get exit codes and status)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Read Pod logs (optional, for failure details)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
