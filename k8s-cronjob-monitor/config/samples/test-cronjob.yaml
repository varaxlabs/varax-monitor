apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob
  namespace: default
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: test
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - echo "Hello from test CronJob at $(date)" && sleep 5
          restartPolicy: OnFailure
